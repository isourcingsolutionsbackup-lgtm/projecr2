<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Speed Typer Ultimate</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#020617;
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* BOX */
.game{
  background:#0f172a;
  padding:30px;
  border-radius:15px;
  width:400px;
  text-align:center;
  box-shadow:0 0 30px rgba(0,255,255,0.2);
}

/* BUTTON */
button{
  padding:10px 20px;
  border:none;
  background:#38bdf8;
  border-radius:8px;
  cursor:pointer;
  font-size:16px;
}

/* WORD */
.word{
  font-size:30px;
  color:#38bdf8;
  margin:20px 0;
}

input{
  padding:10px;
  width:80%;
  border:none;
  border-radius:8px;
  outline:none;
}

/* HIDE */
.hide{
  display:none;
}

.info{
  display:flex;
  justify-content:space-between;
}
</style>

</head>
<body>

<div class="game">

  <!-- START SCREEN -->
  <div id="startScreen">
    <h1>⚡ Speed Typer</h1>
    <button onclick="startGame()">Start Game</button>
  </div>

  <!-- GAME SCREEN -->
  <div id="gameScreen" class="hide">
    <div class="info">
      <div>⏱ <span id="time">10</span></div>
      <div>🏆 <span id="score">0</span></div>
    </div>

    <p>Level: <span id="level">1</span></p>

    <div class="word" id="word"></div>

    <input id="input" placeholder="Type here...">
  </div>

  <!-- GAME OVER -->
  <div id="overScreen" class="hide">
    <h1>💀 Game Over</h1>
    <p>Score: <span id="finalScore"></span></p>
    <p>Level: <span id="finalLevel"></span></p>
    <button onclick="restart()">Restart</button>
  </div>

</div>

<script>

let words = [
"html","css","javascript","developer","keyboard","function",
"variable","object","browser","design","animation","challenge",
"performance","responsive","database","network","frontend"
];

let currentWord="";
let score=0;
let time=10;
let level=1;
let gameInterval;

/* START */
function startGame(){
  document.getElementById("startScreen").classList.add("hide");
  document.getElementById("gameScreen").classList.remove("hide");

  newWord();
  startTimer();
}

/* NEW WORD */
function newWord(){
  currentWord = words[Math.floor(Math.random()*words.length)];
  document.getElementById("word").innerText = currentWord;
}

/* INPUT */
let input = document.getElementById("input");

input.addEventListener("input", function(){
  if(this.value === currentWord){

    score++;
    document.getElementById("score").innerText = score;

    this.value="";

    /* LEVEL UP EVERY 10 WORDS */
    if(score % 10 === 0){
      level++;
      document.getElementById("level").innerText = level;
    }

    /* HARDER GAME */
    time += Math.max(1, 3 - level);

    newWord();
  }
});

/* TIMER */
function startTimer(){
  gameInterval = setInterval(()=>{
    time--;
    document.getElementById("time").innerText = time;

    if(time <= 0){
      gameOver();
    }

  },1000);
}

/* GAME OVER */
function gameOver(){
  clearInterval(gameInterval);

  document.getElementById("gameScreen").classList.add("hide");
  document.getElementById("overScreen").classList.remove("hide");

  document.getElementById("finalScore").innerText = score;
  document.getElementById("finalLevel").innerText = level;
}

/* RESTART */
function restart(){
  location.reload();
}

</script>

</body>
</html>
