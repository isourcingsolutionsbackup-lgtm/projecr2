<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Archery Pro</title>

<style>
body{
  margin:0;
  overflow:hidden;
  background:#111;
}
canvas{
  display:block;
}
</style>
git rm --cached "D. 20 Archery  game.html"
</head>
<body>

<canvas id="c"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let bow = {x:120, y:canvas.height/2};
let arrow = null;

let aiming = false;
let aimX=0, aimY=0;

let target = {
  x: canvas.width - 150,
  y: canvas.height/2,
  r: 40
};

let score = 0;

/* DRAW TARGET */
function drawTarget(){
  let colors = ["white","orange","red"];
  for(let i=0;i<3;i++){
    ctx.beginPath();
    ctx.arc(target.x, target.y, target.r - i*12, 0, Math.PI*2);
    ctx.fillStyle = colors[i];
    ctx.fill();
  }
}

/* DRAW BOW */
function drawBow(){
  ctx.beginPath();
  ctx.arc(bow.x, bow.y, 60, Math.PI/2, Math.PI*1.5);
  ctx.strokeStyle = "lime";
  ctx.lineWidth = 4;
  ctx.stroke();
}

/* DRAW STRING */
function drawString(){
  if(!aiming) return;

  ctx.beginPath();
  ctx.moveTo(bow.x, bow.y-60);
  ctx.lineTo(aimX, aimY);
  ctx.lineTo(bow.x, bow.y+60);
  ctx.strokeStyle = "#fff";
  ctx.lineWidth = 2;
  ctx.stroke();
}

/* DRAW ARROW */
function drawArrow(a){
  ctx.save();
  ctx.translate(a.x, a.y);
  ctx.rotate(a.angle);

  // body
  ctx.beginPath();
  ctx.moveTo(0,0);
  ctx.lineTo(-30,0);
  ctx.strokeStyle = "#ccc";
  ctx.lineWidth = 3;
  ctx.stroke();

  // head
  ctx.beginPath();
  ctx.moveTo(0,0);
  ctx.lineTo(-5,-5);
  ctx.lineTo(-5,5);
  ctx.fillStyle = "lime";
  ctx.fill();

  ctx.restore();
}

/* UPDATE */
function update(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  drawBow();
  drawTarget();
  drawString();

  if(arrow){
    arrow.x += arrow.vx;
    arrow.y += arrow.vy;

    arrow.angle = Math.atan2(arrow.vy, arrow.vx);

    // hit
    let dx = arrow.x - target.x;
    let dy = arrow.y - target.y;
    let dist = Math.sqrt(dx*dx + dy*dy);

    if(dist < target.r){
      score++;
      alert("🎯 Hit! Score: "+score);

      arrow = null;
      target.y = Math.random()*canvas.height;
    }

    drawArrow(arrow);
  }

  // AIM ARROW PREVIEW
  if(aiming){
    let angle = Math.atan2(aimY-bow.y, aimX-bow.x);
    drawArrow({x:aimX, y:aimY, angle:angle});
  }

  // SCORE
  ctx.fillStyle="#fff";
  ctx.font="20px sans-serif";
  ctx.fillText("Score: "+score, 20,30);

  requestAnimationFrame(update);
}

/* EVENTS */
canvas.addEventListener("mousedown",(e)=>{
  aiming = true;
  aimX = e.clientX;
  aimY = e.clientY;
});

canvas.addEventListener("mousemove",(e)=>{
  if(aiming){
    aimX = e.clientX;
    aimY = e.clientY;
  }
});

canvas.addEventListener("mouseup",(e)=>{
  if(!aiming) return;
  aiming = false;

  let dx = bow.x - aimX;
  let dy = bow.y - aimY;

  arrow = {
    x: bow.x,
    y: bow.y,
    vx: dx * 0.15,
    vy: dy * 0.15,
    angle:0
  };
});

/* START */
update();
</script>

</body>
</html>
